[tryton]
version=8.0.0
depends:
    ir
    account
extras_depend:
    account_statement
xml:
    account.xml
    account_ar.xml
    tax_ar.xml
    fiscalyear.xml
    statement.xml
    message.xml

[register]
model:
    account.TaxTemplate
    account.Tax
    account.TaxGroup
    account.Account
    move.Line
    fiscalyear.BalanceDeferralStart
    fiscalyear.RestartDeferralStart
wizard:
    fiscalyear.BalanceDeferral
    fiscalyear.RestartDeferral

[register account_statement]
model:
    statement.Line
    statement.Statement
    statement.StatementLine
